<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=0.8, minimal-ui">
        <meta name="theme-color" content="#36393E">

        <meta name="description" content="WiFi Duck">
        <title>WiFi Duck | Terminal</title>

        <link rel="stylesheet" type="text/css" href="style.css">
        <script src="script.js"></script>
        <script src="terminal.js"></script>
    </head>
    <body>
        <main>
            <section>
                <h2>Terminal</h2>
                <div class="row">
                    <input type="text" class="smooth" id="input" value="help">
                    <button class="btn primary" id="send">send</button>
                    <button class="btn warn" id="clear">clear</button>
                    <button class="btn white" id="reconnect">reconnect</button>
                </div>
                <div class="row">
                    <div id="output" class="terminal"></div>
                </div>
            </section>
        </main>
    </body>
</html>
