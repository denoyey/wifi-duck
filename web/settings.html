<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=0.8, minimal-ui">
        <meta name="theme-color" content="#36393E">

        <meta name="description" content="WiFi Duck">
        <title>WiFi Duck | Settings</title>

        <link rel="stylesheet" type="text/css" href="style.css">
        <script src="script.js"></script>
        <script src="settings.js"></script>
    </head>
    <body>
        <main>
            <section>
                <h1>WiFi</h1>
                <p class="text-muted">Restart the device to apply new settings.</p>
                <div class="settings-table">
                    <table>
                        <tr>
                            <td>SSID:</td>
                            <td id="ssid" class="fw-bold"></td>
                            <td>
                                <button class="primary pill-btn" id="edit_ssid">Edit</button>
                            </td>
                        </tr>
                        <tr>
                            <td>Password:</td>
                            <td id="password" class="fw-bold"></td>
                            <td>
                                <button class="primary pill-btn" id="edit_password">Edit</button>
                            </td>
                        </tr>
                        <tr>
                            <td>Channel:</td>
                            <td id="channel" class="fw-bold"></td>
                            <td>
                                <button class="primary pill-btn" id="edit_channel">Edit</button>
                            </td>
                        </tr>
                        <tr>
                            <td>Autorun Script:</td>
                            <td id="autorun" class="fw-bold"></td>
                            <td>
                                <button class="warn pill-btn" id="disable_autorun">Disable</button>
                            </td>
                        </tr>
                    </table>
                </div>
                <button class="danger w-100" id="reset" style="margin-top: 10px;">Reset Settings</button>
            </section>
            <section>
                <h1>Update</h1>
                <p class="text-muted" style="margin-bottom: 20px; line-height: 1.6;">
                    Go to
                    <a href="https://github.com/spacehuhntech/WiFiDuck/releases" target="_blank" style="font-weight: 600;">wifiduck.com/releases</a>
                    to check for updates.<br>Select a .bin file and press upload to update the device.
                </p>

                <form method='POST' action='/update' enctype='multipart/form-data' class="update-form">
                    <input type='file' name='update' accept=".bin" required>
                    <button type='submit' class="warn w-100" style="margin-top: 10px;">Upload Firmware</button>
                </form>
            </section>
        </main>
    </body>
</html>
